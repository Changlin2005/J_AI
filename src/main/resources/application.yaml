server:
  port: 8080
spring:
  application:
    name: AI
  ai:
    openai:
      api-key: ${Qwen_Api_Key}
      base-url: https://dashscope.aliyuncs.com/compatible-mode
      chat:
        options:
          model: qwen3-max-2026-01-23
          temperature: 0.8
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: always
            platform: mysql
    vectors-tore:
      redis:
        initialize-schema: true
        index-name: Elysia-index
        prefix: Elysia-prefix
    dashscope:
      api-key: ${Qwen_Api_Key}
      chat:
        options:
          model: qwen3-max-2026-01-23
      embedding:
        options:
          model: text-embedding-v4
    ollama:
      base-url: http://localhost:11434
      chat:
        model: Elysia_Mei
      init:
        timeout: 30000

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/ai?serverTimezone=UTC
    username: root
    password: ${MySql_Password}

  data:
    redis:
      host: 127.0.0.1
      port: 6379
      lettuce:
        pool:
          max-active: 10
          max-idle: 10
          min-idle: 1
          time-between-eviction-runs: 10s
  jackson:
    default-property-inclusion: non_null
mybatis-plus:
  type-aliases-package: com.lcl.ai.pojo
